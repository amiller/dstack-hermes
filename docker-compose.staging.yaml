# Staging compose with TEE socket proxy + SSH sidecar
# Deploy/update:
#   phala deploy --cvm-id hermes-staging -c docker-compose.staging.yaml -e deploy-notes/.env.staging
# SSH in:
#   phala ssh hermes-staging -- -i deploy-notes/deploy_key -p 2222
#   Then: docker exec -it dstack-hermes-1 bash
services:
  tee-daemon:
    image: ghcr.io/amiller/tee-socket-proxy@sha256:80d00123dd15bb6490ec41be9dada82d4cdfcf0333afb78bfc8f82c8298adda5
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - proxy_sockets:/var/run/proxy
      - daemon_data:/var/lib/tee-daemon
    environment:
      - TEE_DAEMON_TOKEN=${TEE_DAEMON_TOKEN}
      - DAEMON_VOLUME_NAME=dstack_daemon_data
      - DAEMON_VOLUME_MOUNT=/var/lib/tee-daemon

  hermes:
    image: ghcr.io/amiller/hermes-tee@sha256:59d20bfff9d5c839d8b9fa58c37fab2169baef86bc59029b853c54ecbac2d8c5
    volumes:
      - proxy_sockets:/var/run/proxy
      - hermes_data:/root/.hermes
      - claude_data:/root/.claude
      - smithers_data:/home/smithers
    environment:
      - DOCKER_HOST=unix:///var/run/proxy/docker.sock
      - HERMES_MODEL=${HERMES_MODEL}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - GLM_BASE_URL=${GLM_BASE_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GATEWAY_ALLOW_ALL_USERS=false
      - TEE_DAEMON_TOKEN=${TEE_DAEMON_TOKEN}
    depends_on:
      - tee-daemon

  ssh-debug:
    image: ghcr.io/amiller/dstack-ssh-sidecar:latest
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      - SSH_PUBKEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAq0LNzDVBcj6PIY2UP4LOCRJSvbw9cfX8GLSKqUoUmd hermes-tee-staging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/dstack.sock:/var/run/dstack.sock

volumes:
  hermes_data:
  claude_data:
  smithers_data:
  daemon_data:
  proxy_sockets:
